# Reverse proxy for TakVPN customer UI (Next.js on localhost:3000)
# Install: sudo cp deploy/nginx/takvpn.com.conf /etc/nginx/sites-available/takvpn.com
#          sudo ln -sf /etc/nginx/sites-available/takvpn.com /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx

upstream takvpn_web {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name takvpn.com www.takvpn.com;

    client_max_body_size 20m;

    location / {
        proxy_pass http://takvpn_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
}
